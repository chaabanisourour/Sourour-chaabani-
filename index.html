<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sourour Chaabani</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0a0a0a;
  color: #fff;
  overflow-x: hidden;
}

/* HEADER */
header {
  position: fixed;
  width: 100%;
  top: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  z-index: 1000;
}

.logo {
  font-family: 'Playfair Display', serif;
  color: #C9A96E;
}

.menu-btn {
  font-size: 22px;
  cursor: pointer;
}

/* MENU */
nav {
  position: fixed;
  right: -100%;
  top: 0;
  width: 70%;
  height: 100%;
  background: #000;
  padding: 40px;
  transition: 0.4s;
}

nav a {
  display: block;
  color: #C9A96E;
  text-decoration: none;
  margin: 20px 0;
  font-size: 18px;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 20px;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  color: #C9A96E;
}

.hero p {
  opacity: 0.7;
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: #C9A96E;
  color: #000;
  border-radius: 30px;
  text-decoration: none;
}

/* SECTIONS */
section {
  padding: 60px 20px;
}

h2 {
  color: #C9A96E;
  font-family: 'Playfair Display', serif;
}

/* PORTFOLIO */
.gallery {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.gallery div {
  height: 120px;
  background: #222;
  border-radius: 10px;
}

/* ANIMATION */
.reveal {
  opacity: 0;
  transform: translateY(40px);
  transition: 0.8s;
}

.reveal.active {
  opacity: 1;
  transform: translateY(0);
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px;
  background: #000;
}
</style>
</head>

<body>

<header>
  <div class="logo">Sourour Chaabani</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<nav id="menu">
  <a href="#">Accueil</a>
  <a href="#services">Services</a>
  <a href="#portfolio">Portfolio</a>
  <a href="#contact">Contact</a>
</nav>

<section
